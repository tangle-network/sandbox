name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check-types
      - run: pnpm test
      - run: pnpm build
      - run: pnpm openapi:validate
      - run: pnpm openapi:types
      - name: Ensure generated OpenAPI types are committed
        run: git diff --exit-code -- src/generated/openapi-types.ts
